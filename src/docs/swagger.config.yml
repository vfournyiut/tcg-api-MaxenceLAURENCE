openapi: 3.0.0
info:
  title: Documentation TCG API Maxence Laurence 
  version: 1.0.0
  description: Documentation de l'API TCG 
  contact:
    name: Maxence Laurence
    email: maxence.laurence.pro@gmail.com

servers:
  - url: http://localhost:3001
    description: Serveur de développement

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "Token JWT à obtenir via /api/auth/sign-in"

  schemas:
    PokemonType:
      type: string
      enum:
        - Normal
        - Fire
        - Water
        - Electric
        - Grass
        - Ice
        - Fighting
        - Poison
        - Ground
        - Flying
        - Psychic
        - Bug
        - Rock
        - Ghost
        - Dragon
        - Dark
        - Steel
        - Fairy
      example: "Fire"

    Card:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "Pikachu"
        hp:
          type: integer
          example: 35
        attack:
          type: integer
          example: 55
        type:
          $ref: '#/components/schemas/PokemonType'
        pokedexNumber:
          type: integer
          example: 25
        imgUrl:
          type: string
          nullable: true
          example: "https://example.com/pikachu.png"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        username:
          type: string
          example: "AshKetchum"
        email:
          type: string
          format: email
          example: "ash@kanto.com"
        password:
          type: string
          example: "password123"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Deck:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "Mon super deck"
        userId:
          type: integer
          example: 1
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    DeckCard:
      type: object
      properties:
        id:
          type: integer
          example: 1
        deckId:
          type: integer
          example: 1
        cardId:
          type: integer
          example: 25

    Error:
      type: object
      properties:
        message:
          type: string
          example: "Message d'erreur"

tags:
  - name: Authentication
    description: Gestion de l'authentification
  - name: Users
    description: Gestion des utilisateurs
